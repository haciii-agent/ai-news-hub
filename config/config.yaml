# AI News Hub Configuration

server:
  host: "0.0.0.0"
  port: 8089

database:
  path: "./data/news.db"

collector:
  user_agent: "ai-news-hub/1.0"
  timeout: 30s
  max_concurrent: 5
  request_interval: "2-5s"
  rss_max_items: 50

classifier:
  rules_path: "./config/rules.yaml"

log:
  level: "info"

# AI 智能摘要配置
# API Key 通过环境变量 AI_API_KEY 设置（不进 git）
ai:
  api_base: "https://api.minimaxi.com/v1"
  api_key: ""
  model: "MiniMax-M2.7-highspeed"
  max_concurrent: 5
  timeout: 30s

# 微信公众号发布配置
# 通过环境变量 WX_APPID 和 WX_SECRET 设置（不进 git）
wechat:
  appid: ""
  secret: ""
