# =============================================================================
# AI News Hub - 分类规则配置 (T004)
# =============================================================================
# 共 8 个分类：AI/ML、科技前沿、商业动态、开源生态、学术研究、政策监管、产品发布、综合资讯（兜底）
#
# 维护说明：
#   - 含 # PERIODIC_UPDATE 标注的关键词为时效性关键词，需定期维护更新
#   - 每个分类下 keywords 为基础关键词，boost_keywords 为高权重关键词
#   - 分类引擎对 title + summary 做关键词匹配，计算加权得分，取最高分分类
#   - 数据源的 category 字段可作为预分类权重加成
#   - 修改此文件后支持热更新，无需重启服务
# =============================================================================

# 预分类权重：当数据源的 category 与规则分类匹配时，额外加成的分数
source_category_boost: 2.0

