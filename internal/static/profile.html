<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 — AI News Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="/" class="header-logo">
          <span class="logo-icon">📰</span>
          <span>AI News <span class="logo-text-accent">Hub</span></span>
        </a>
        <span class="header-clock"></span>
      </div>
      <div class="header-right">
        <a href="/recommendations.html" class="header-nav-link" title="推荐">🎯</a>
        <a href="/dashboard.html" class="header-nav-link" title="数据看板">📊</a>
        <a href="/trends.html" class="header-nav-link" title="趋势分析">📈</a>
        <a href="/bookmarks.html" class="header-nav-link" title="收藏">📌</a>
        <a href="/history.html" class="header-nav-link" title="阅读历史">📖</a>
      </div>
    </header>

    <!-- Logout -->
      <div class="profile-card">
        <button class="btn-danger" @click="handleLogout">🚪 退出登录</button>
      </div>
    </main>

    <!-- Loading -->
    <div class="loading-spinner" v-if="loading"><span>加载中...</span></div>

    <!-- Footer -->
    <div class="footer-copyright">AI News Hub v1.3.0 · 用心搭建 ⚡</div>
  </div>

  <div id="toast"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/store.js"></script>
  <script>
  const { createApp, ref, reactive, computed, onMounted } = Vue;
  createApp({
    setup() {
      const S = window.aiNewsHub;
      const store = S.store;

      const loading = ref(true);
      const profile = ref(null);
      const streak = ref(null);
      const oldPwd = ref('');
      const newPwd = ref('');
      const newPwd2 = ref('');
      const pwdError = ref('');
      const pwdSuccess = ref('');
      const changingPwd = ref(false);

      const interestTags = computed(() => {
        if (!profile.value || !profile.value.profile || !profile.value.profile.interests) return [];
        return Object.entries(profile.value.profile.interests)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 20)
          .map(([name, weight]) => ({ name, weight }));
      });

      function roleLabel(role) {
        const map = { admin: '管理员', editor: '编辑', viewer: '普通用户', anonymous: '匿名' };
        return map[role] || role;
      }

      function formatDate(d) {
        if (!d) return '—';
        return new Date(d).toLocaleString('zh-CN');
      }

      async function handleChangePwd() {
        pwdError.value = '';
        pwdSuccess.value = '';
        if (newPwd.value.length < 8 || !/[a-z]/.test(newPwd.value) || !/[A-Z]/.test(newPwd.value) || !/\d/.test(newPwd.value)) {
          pwdError.value = '新密码至少8位，需含大小写字母和数字'; return;
        }
        if (newPwd.value !== newPwd2.value) { pwdError.value = '两次密码不一致'; return; }
        changingPwd.value = true;
        try {
          const data = await S.apiFetch('/user/password', {
            method: 'PUT',
            body: JSON.stringify({ old_password: oldPwd.value, new_password: newPwd.value }),
          });
          if (data.error) { pwdError.value = data.message || '修改失败'; }
          else {
            pwdSuccess.value = '密码修改成功';
            oldPwd.value = ''; newPwd.value = ''; newPwd2.value = '';
          }
        } catch(e) { pwdError.value = '请求失败'; }
        finally { changingPwd.value = false; }
      }

      async function handleLogout() {
        await S.logout();
        location.href = '/';
      }

      function toggleTheme() { S.toggleTheme(); }

      onMounted(async () => {
        S.initTheme();
        await S.initAuth();
        if (!S.isLoggedIn()) {
          localStorage.setItem('login_redirect', '/profile.html');
          location.href = '/login.html';
          return;
        }
        try {
          const [profileData, streakData] = await Promise.all([
            S.apiFetch('/user/profile'),
            S.apiFetch('/user/streak').catch(() => null),
          ]);
          profile.value = profileData.user || profileData;
          streak.value = streakData;
        } catch(e) {}
        loading.value = false;
        S.updateNavUI();
      });

      return {
        store, loading, profile, streak, interestTags,
        oldPwd, newPwd, newPwd2, pwdError, pwdSuccess, changingPwd,
        roleLabel, formatDate, handleChangePwd, handleLogout, toggleTheme,
      };
    }
  }).mount('#app');
  </script>
</body>
</html>
