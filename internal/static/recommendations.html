<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猜你喜欢 — AI News Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="/" class="header-logo">
          <span class="logo-icon">📰</span>
          <span>AI News <span class="logo-text-accent">Hub</span></span>
        </a>
        <span class="header-clock"></span>
      </div>
      <div class="header-right">
        <a href="/recommendations.html" class="header-nav-link header-nav-link-active" title="推荐">🎯</a>
        <a href="/dashboard.html" class="header-nav-link" title="数据看板">📊</a>
        <a href="/trends.html" class="header-nav-link" title="趋势分析">📈</a>
        <a href="/bookmarks.html" class="header-nav-link" title="收藏">📌</a>
        <a href="/history.html" class="header-nav-link" title="阅读历史">📖</a>
      </div>
    </header>

    <!-- Page Title -->
    <div class="page-title-bar">
      <h1 class="page-title">🎯 猜你喜欢</h1>
    </div>

    <!-- Main -->
    <main class="main-content">
        <button class="load-more-btn" @click="loadMore" :disabled="loadingMore">
          {{ loadingMore ? '加载中...' : '加载更多' }}
        </button>
      </div>
    </main>

    <div class="footer-copyright">AI News Hub v1.3.0 · 用心搭建 ⚡</div>
  </div>

  <div id="toast"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/store.js"></script>
  <script>
  const { createApp, ref, onMounted } = Vue;
  createApp({
    setup() {
      const S = window.aiNewsHub;
      const articles = ref([]);
      const loading = ref(true);
      const loadingMore = ref(false);
      const page = ref(1);
      const hasMore = ref(true);

      async function load(recursive) {
        if (!recursive) loading.value = true;
        else loadingMore.value = true;
        try {
          const data = await S.api.get('/recommendations?page=' + page.value + '&per_page=20');
          const list = Array.isArray(data.articles) ? data.articles : [];
          if (recursive) articles.value.push(...list);
          else articles.value = list;
          hasMore.value = list.length >= 20;
        } finally {
          loading.value = false;
          loadingMore.value = false;
        }
      }

      function loadMore() { page.value++; load(true); }

      function recordRead(a) { S.recordRead({ id: a.id, title: a.title, source: a.source }); }

      async function toggleBookmark(a) {
        if (!S.isLoggedIn()) { S.showToast('请先登录'); return; }
        try {
          if (a.is_bookmarked) {
            await S.api.del('/bookmarks/' + a.id);
            a.is_bookmarked = false;
            S.showToast('已取消收藏');
          } else {
            await S.api.post('/bookmarks', { article_id: a.id, title: a.title, source: a.source });
            a.is_bookmarked = true;
            S.showToast('已收藏');
          }
        } catch { S.showToast('操作失败'); }
      }

      function formatTime(ts) {
        if (!ts) return '';
        const d = new Date(ts * 1000);
        const now = new Date();
        const diff = (now - d) / 1000;
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 604800) return Math.floor(diff / 86400) + '天前';
        return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
      }

      function getCatClass(cat) {
        const m = S.CATEGORY_COLORS[cat.trim()] || 'tag-general';
        return m.replace('tag-', '');
      }

      onMounted(() => {
        S.initTheme();
        S.initAuth();
        load(false);
      });

      return { S, articles, loading, loadingMore, hasMore, loadMore, recordRead, toggleBookmark, formatTime, getCatClass };
    }
  }).mount('#app');
  </script>
</body>
</html>
