<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Hub — AI 资讯聚合</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">
        <span class="logo-icon">📰</span>
        <span>AI News <span class="logo-text-accent">Hub</span></span>
      </a>
      <span class="header-clock" id="headerClock"></span>
    </div>
    <div class="header-right">
      <div class="collect-status-badge never_run" id="collectStatus" style="display:none;"></div>
      <!-- Nav links (v0.7.0+) -->
      <a href="/recommendations.html" class="header-nav-link" title="推荐">🎯</a>
      <a href="/dashboard.html" class="header-nav-link" title="数据看板">📊</a>
      <a href="/bookmarks.html" class="header-nav-link" title="收藏">📌</a>
      <a href="/history.html" class="header-nav-link" title="阅读历史">📖</a>
      <div class="search-container" id="searchContainer">
        <button class="search-toggle" id="searchToggle" title="搜索新闻 (/)">🔍</button>
        <div class="search-input-wrap" id="searchInputWrap">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索新闻..." autocomplete="off">
          <button class="search-clear" id="searchClear" title="清除搜索" style="display:none;">✕</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="all">全部</button>
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <span class="stat-item">共 <span class="stat-value" id="statTotal">—</span> 篇</span>
    <span class="stat-sep">·</span>
    <span class="stat-item">中文 <span class="stat-value" id="statZh">—</span></span>
    <span class="stat-sep">·</span>
    <span class="stat-item">英文 <span class="stat-value" id="statEn">—</span></span>
    <span class="stat-sep">·</span>
    <span class="stat-item" id="statCategoriesWrap"><span class="stat-value" id="statCategories">—</span> 个分类</span>
    <span class="stat-sep">·</span>
    <span class="stat-item" id="statLastCollect">最近采集: —</span>
  </div>

  <!-- Category Bar -->
  <nav class="category-bar" id="categoryBar">
    <div class="category-tabs" id="categoryTabs">
      <!-- Dynamically populated -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div id="articleList">
      <!-- Skeleton placeholders -->
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
    </div>

    <div id="loadMoreWrap" class="load-more-wrap" style="display:none;">
      <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
    </div>

    <div id="statsFooter" class="stats-footer"></div>
    <div class="footer-copyright">AI News Hub v1.0.0 · 用心搭建 ⚡</div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
