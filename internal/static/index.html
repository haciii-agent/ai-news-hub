<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Hub — AI 资讯聚合</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">
        <span class="logo-icon">📰</span>
        <span>AI News Hub</span>
      </a>
    </div>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn active" data-lang="all">全部</button>
      <button class="lang-btn" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <!-- Category Bar -->
  <nav class="category-bar" id="categoryBar">
    <div class="category-tabs" id="categoryTabs">
      <!-- Dynamically populated -->
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div id="articleList">
      <!-- Skeleton placeholders -->
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-rank"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-summary"></div><div class="skeleton-summary"></div><div class="skeleton-meta"></div></div></div>
    </div>

    <div id="loadMoreWrap" class="load-more-wrap" style="display:none;">
      <button id="loadMoreBtn" class="load-more-btn">加载更多</button>
    </div>

    <div id="statsFooter" class="stats-footer"></div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
