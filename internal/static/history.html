<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读历史 — AI News Hub</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="/" class="header-logo">
          <span class="logo-icon">📰</span>
          <span>AI News <span class="logo-text-accent">Hub</span></span>
        </a>
      </div>
      <div class="header-right">
        <a href="/recommendations.html" class="header-nav-link" title="推荐">🎯</a>
        <a href="/dashboard.html" class="header-nav-link" title="数据看板">📊</a>
        <a href="/trends.html" class="header-nav-link" title="趋势分析">📈</a>
        <a href="/bookmarks.html" class="header-nav-link" title="收藏">📌</a>
        <a href="/history.html" class="header-nav-link header-nav-link-active" title="阅读历史">📖</a>
      </div>
    </header>

    <!-- Page Title -->
    <div class="page-title-bar">
      <h1 class="page-title">📖 阅读历史</h1>
    </div>

    <!-- Main -->
    <main class="main-content">
      <!-- Not logged in -->
      <div v-if="!S.isLoggedIn()" class="empty-state" style="padding:60px;text-align:center">
        <p>登录后可查看阅读历史</p>
        <a href="/login.html" class="btn-primary" style="display:inline-block;margin-top:16px;text-decoration:none">去登录</a>
      </div>

      <!-- Empty state -->
      <div v-else-if="!loading && articles.length === 0" class="empty-state" style="padding:60px;text-align:center">
        <p>暂无阅读历史</p>
        <a href="/" class="btn-primary" style="display:inline-block;margin-top:16px;text-decoration:none">去首页看看</a>
      </div>

      <!-- Article list -->
      <div v-else class="article-list">
        <article v-for="a in articles" :key="a.id" class="article-card">
          <div class="article-meta">
            <span class="article-source">{{ a.source }}</span>
            <span class="article-sep">·</span>
            <span class="article-time">{{ formatTime(a.read_at || a.collected_at) }}</span>
          </div>
          <h2 class="article-title">
            <a :href="'/article.html?id=' + a.article_id" target="_blank">{{ a.title }}</a>
          </h2>
        </article>
      </div>

      <!-- Load more -->
      <div class="load-more-wrap" v-if="hasMore && !loading">
        <button class="load-more-btn" @click="loadMore">加载更多</button>
      </div>
      <div class="load-more-wrap" v-if="loading && articles.length">
        <button class="load-more-btn" disabled>加载中...</button>
      </div>

      <!-- Stats footer -->
      <div class="stats-footer" v-if="totalArticles > 0">
        共 {{ totalArticles }} 篇 · 第 {{ currentPage }}/{{ totalPages }} 页
      </div>
    </main>

    <div class="footer-copyright">AI News Hub v1.3.0 · 用心搭建 ⚡</div>
  </div>

  <div id="toast"></div>

  <script src="js/store.js"></script>
  <script>
  const { createApp, ref, computed, onMounted } = Vue;
  createApp({
    setup() {
      const S = window.aiNewsHub;
      const PER_PAGE = 20;
      const articles = ref([]);
      const currentPage = ref(1);
      const totalPages = ref(1);
      const totalArticles = ref(0);
      const loading = ref(true);

      const hasMore = computed(() => currentPage.value < totalPages.value);

      function formatTime(dateStr) {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          const diff = new Date() - d;
          if (diff < 60000) return '刚刚';
          if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
          if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
          if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
          return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        } catch(e) { return dateStr; }
      }

      async function loadHistory(append) {
        if (loading.value) return;
        loading.value = true;
        if (!append) { articles.value = []; currentPage.value = 1; }
        try {
          const data = await S.apiFetch('/history?page=' + currentPage.value + '&per_page=' + PER_PAGE);
          if (data.error) { S.showToast(data.message); return; }
          const list = data.articles || [];
          if (append) articles.value.push(...list);
          else articles.value = list;
          totalPages.value = data.total_pages || 1;
          totalArticles.value = data.total || 0;
        } catch(e) { console.error(e); }
        finally { loading.value = false; }
      }

      function loadMore() {
        currentPage.value++;
        loadHistory(true);
      }

      onMounted(async () => {
        S.initTheme();
        await S.initAuth();
        await loadHistory(false);
      });

      return { S, articles, currentPage, totalPages, totalArticles, loading, hasMore, formatTime, loadMore };
    }
  }).mount('#app');
  </script>
</body>
</html>
